{% extends "base.html" %}

{% block page_title %}Dashboard{% endblock %}

{% block content %}
<div class="panel">
  <h2>Overview</h2>
  <div class="dashboard-grid" id="stats-grid">
    <div class="stat-card">
      <div class="label">Total Receipts</div>
      <div class="value" id="stat-receipts">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Spent</div>
      <div class="value" id="stat-amount">€0</div>
    </div>
    <div class="stat-card">
      <div class="label">CO2 Emissions</div>
      <div class="value" id="stat-co2">0 kg</div>
    </div>
  </div>
</div>

<div class="panel">
  <h2>Category Breakdown</h2>
  <div id="categories-breakdown"></div>
</div>

<div class="panel">
  <h2>Carbon Footprint Tips</h2>
  <p id="carbon-tips" style="font-size: 1.1rem; line-height: 1.6;"></p>
</div>

<div class="panel">
  <h2>Monthly Stats</h2>
  <div id="monthly-stats"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadStats() {
  const response = await fetch('/api/stats');
  if (!response.ok) return;

  const stats = await response.json();

  document.getElementById('stat-receipts').textContent = stats.total_receipts;
  document.getElementById('stat-amount').textContent = '€' + stats.total_spent.toFixed(2);
  document.getElementById('stat-co2').textContent = stats.total_co2.toFixed(1) + ' kg';
  document.getElementById('carbon-tips').textContent = stats.carbon_tip;

  // Category breakdown
  const catDiv = document.getElementById('categories-breakdown');
  catDiv.innerHTML = '';
  for (const [cat, data] of Object.entries(stats.category_breakdown)) {
    const item = document.createElement('div');
    item.className = 'category-item';
    item.innerHTML = `
      <strong>${cat}</strong>
      <div>${data.count} receipts · €${data.amount.toFixed(2)} · ${data.co2.toFixed(1)} kg CO2</div>
    `;
    catDiv.appendChild(item);
  }

  // Monthly stats
  const monthlyDiv = document.getElementById('monthly-stats');
  monthlyDiv.innerHTML = '';
  for (const month of stats.monthly_stats.reverse()) {
    const item = document.createElement('div');
    item.className = 'category-item';
    item.innerHTML = `
      <strong>${month.month}</strong>
      <div>€${(month.total || 0).toFixed(2)} · ${(month.co2 || 0).toFixed(1)} kg CO2</div>
    `;
    monthlyDiv.appendChild(item);
  }

  // Update CO2 badge in header
  document.getElementById('co2-badge-text').textContent = '🌍 ' + stats.total_co2.toFixed(1) + ' kg CO2';
}

loadStats();
setInterval(loadStats, 30000);
</script>
{% endblock %}
